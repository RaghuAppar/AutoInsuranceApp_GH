<div class="auth-card">
  <h1>Create Account</h1>
  <div ng-if="vm.error" class="alert alert-error">{{ vm.error }}</div>
  <form ng-submit="vm.submit()">
    <div class="form-group">
      <label for="fullName">Full Name</label>
      <input id="fullName" type="text" ng-model="vm.fullName" placeholder="John Doe" required>
    </div>
    <div class="form-group">
      <label for="regEmail">Email</label>
      <input id="regEmail" type="email" ng-model="vm.email" placeholder="you@example.com" required>
    </div>
    <div class="form-group">
      <label for="phone">Phone (optional)</label>
      <input id="phone" type="tel" ng-model="vm.phone" placeholder="(555) 123-4567">
    </div>
    <div class="form-group">
      <label for="regPassword">Password</label>
      <input id="regPassword" type="password" ng-model="vm.password" placeholder="••••••••" required>
    </div>
    <button type="submit" class="btn btn-primary" ng-disabled="vm.loading">{{ vm.loading ? 'Creating...' : 'Register' }}</button>
  </form>
  <p class="footer-link">Already have an account? <a href="#!/login">Sign In</a></p>
</div>
