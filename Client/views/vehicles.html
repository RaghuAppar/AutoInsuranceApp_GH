<div class="card">
  <h2>My Vehicles</h2>
  <div ng-if="vm.error" class="alert alert-error">{{ vm.error }}</div>
  <p ng-if="vm.loading">Loading...</p>
  <div ng-if="!vm.loading">
    <div class="actions">
      <button type="button" class="btn btn-primary" ng-click="vm.showForm = !vm.showForm" ng-hide="vm.showForm">Add Vehicle</button>
      <a href="#!/quote/new" class="btn btn-success" ng-show="vm.list.length">Get a Quote</a>
    </div>
    <div ng-if="vm.showForm" class="card" style="margin-top: 16px;">
      <h3>New Vehicle</h3>
      <form ng-submit="vm.add()">
        <div class="form-group">
          <label>VIN</label>
          <input type="text" ng-model="vm.model.vin" placeholder="17-character VIN" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Make</label>
            <input type="text" ng-model="vm.model.make" required>
          </div>
          <div class="form-group">
            <label>Model</label>
            <input type="text" ng-model="vm.model.model" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Year</label>
            <input type="number" ng-model="vm.model.year" min="1990" max="2030" required>
          </div>
          <div class="form-group">
            <label>Usage</label>
            <select ng-model="vm.model.usage">
              <option value="Personal">Personal</option>
              <option value="Commercial">Commercial</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Annual Mileage (optional)</label>
          <input type="number" ng-model="vm.model.annualMileage" min="0" placeholder="e.g. 12000">
        </div>
        <button type="submit" class="btn btn-primary">Add Vehicle</button>
        <button type="button" class="btn btn-outline" ng-click="vm.showForm = false" style="color: #333; border-color: #999;">Cancel</button>
      </form>
    </div>
    <div ng-if="!vm.list.length && !vm.showForm" class="empty-state">
      <p>No vehicles added yet. Add a vehicle to get a quote.</p>
      <button type="button" class="btn btn-primary" ng-click="vm.showForm = true">Add Vehicle</button>
    </div>
    <div class="table-wrap" ng-if="vm.list.length" style="margin-top: 20px;">
      <table>
        <thead>
          <tr>
            <th>VIN</th>
            <th>Make / Model</th>
            <th>Year</th>
            <th>Usage</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          <tr ng-repeat="v in vm.list">
            <td>{{ v.vin }}</td>
            <td>{{ v.make }} {{ v.model }}</td>
            <td>{{ v.year }}</td>
            <td>{{ v.usage || 'Personal' }}</td>
            <td>
              <button type="button" class="btn btn-danger btn-sm" ng-click="vm.remove(v.id)">Remove</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
