<div class="card">
  <h2>My Profile</h2>
  <p ng-if="vm.loading">Loading...</p>
  <div ng-if="vm.error" class="alert alert-error">{{ vm.error }}</div>
  <div ng-if="vm.message" class="alert alert-success">{{ vm.message }}</div>
  <form ng-if="!vm.loading && vm.model" ng-submit="vm.save()">
    <div class="form-row">
      <div class="form-group">
        <label>Date of Birth</label>
        <input type="date" ng-model="vm.model.dateOfBirth">
      </div>
    </div>
    <div class="form-group">
      <label>Address Line 1</label>
      <input type="text" ng-model="vm.model.addressLine1" placeholder="Street address">
    </div>
    <div class="form-group">
      <label>Address Line 2</label>
      <input type="text" ng-model="vm.model.addressLine2" placeholder="Apt, suite, etc.">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>City</label>
        <input type="text" ng-model="vm.model.city">
      </div>
      <div class="form-group">
        <label>State</label>
        <input type="text" ng-model="vm.model.state" placeholder="e.g. CA">
      </div>
    </div>
    <div class="form-group">
      <label>Postal Code</label>
      <input type="text" ng-model="vm.model.postalCode">
    </div>
    <h3>License</h3>
    <div class="form-row">
      <div class="form-group">
        <label>License Number</label>
        <input type="text" ng-model="vm.model.licenseNumber">
      </div>
      <div class="form-group">
        <label>License State</label>
        <input type="text" ng-model="vm.model.licenseState">
      </div>
    </div>
    <div class="form-group">
      <label>License Expiry</label>
      <input type="date" ng-model="vm.model.licenseExpiry">
    </div>
    <button type="submit" class="btn btn-primary" ng-disabled="vm.saving">{{ vm.saving ? 'Saving...' : 'Save Profile' }}</button>
  </form>
</div>
