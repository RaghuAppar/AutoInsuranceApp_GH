# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    

    steps:
    
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x   
    - name: Restore
      run: dotnet restore AutoInsuranceApi/AutoInsuranceApi.csproj
    - name: Build
      run: dotnet build AutoInsuranceApi/AutoInsuranceApi.csproj  --no-restore
    - name: Test
      run: dotnet test AutoInsuranceApi.Tests/AutoInsuranceApi.Tests.csproj
    - name: Publish
      run: dotnet publish AutoInsuranceApi.Tests/AutoInsuranceApi.Tests.csproj -c Release -o publish
    - name: DeployToAppSerice
      uses: azure/webapps-deploy@v2
      with:
        app-name: autoinsurance
        publish-profile: ${{secrets.AZURE_WEBAPP_PUBLISHPROFILE}}
        package: publish

